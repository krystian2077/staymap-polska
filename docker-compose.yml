services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: staymap_dev
      POSTGRES_USER: staymap
      POSTGRES_PASSWORD: staymap_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staymap -d staymap_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      TEST_DATABASE_HOST: db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nie startują przy zwykłym `docker compose up` — potrzebny profil:
  #   docker compose --profile celery up -d
  # Po zmianie backend/requirements przebuduj obrazy: docker compose build celery_worker celery_beat
  celery_worker:
    profiles: ["celery"]
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    profiles: ["celery"]
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-bookworm
    working_dir: /app
    env_file:
      - .env
    # Osobny wolumen na .next: montowanie ./frontend z Windows zostawiało pusty / uszkodzony cache
    # Next w kontenerze (Linux) wtedy nie tworzył fallback-build-manifest.json → ENOENT.
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - INTERNAL_API_URL=http://backend:8000
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next_cache:
