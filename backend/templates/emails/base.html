<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StayMap Polska{% endblock %}</title>
  <style>
    body { margin:0; padding:0; background:#f4f6f8; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color:#1a1a1a; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 32px 16px; }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }
    .hero {
      background: linear-gradient(135deg, #0d9488 0%, #0f766e 45%, #134e4a 100%);
      color: #fff;
      padding: 28px 24px;
      text-align: center;
    }
    .hero h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .body { padding: 28px 24px 32px; font-size: 15px; line-height: 1.6; }
    .muted { color: #64748b; font-size: 13px; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 22px;
      background: #0d9488;
      color: #fff !important;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
    }
    .footer { padding: 0 24px 28px; text-align: center; font-size: 12px; color: #94a3b8; }
    .pill { display:inline-block; background:rgba(255,255,255,.2); padding:4px 12px; border-radius:999px; font-size:12px; margin-top:8px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      {% block content %}{% endblock %}
    </div>
    <p class="footer">StayMap Polska · Wiadomość wygenerowana automatycznie.</p>
  </div>
</body>
</html>
