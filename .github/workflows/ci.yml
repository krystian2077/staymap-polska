name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: staymap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d staymap_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "False"
      TEST_DATABASE_NAME: staymap_test
      TEST_DATABASE_USER: postgres
      TEST_DATABASE_PASSWORD: postgres
      TEST_DATABASE_HOST: localhost
      TEST_DATABASE_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install system libraries (GDAL, libmagic)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils libproj-dev gdal-bin libgdal-dev libmagic1

      - name: Install Python dependencies
        run: |
          cd requirements
          pip install -r development.txt

      - name: Ruff
        run: ruff check apps config

      - name: Pytest
        run: pytest -q --no-cov
